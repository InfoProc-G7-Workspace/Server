<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Robot Controller</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     STAGE 1 — Connect
     ════════════════════════════════════════════════════════════ -->
<div id="stage-connect" class="stage active">
  <!-- Background graphic -->
  <div class="connect-bg" aria-hidden="true">
    <div class="bg-glow bg-glow--cyan"></div>
    <div class="bg-glow bg-glow--purple"></div>
    <div class="bg-glow bg-glow--blue"></div>
    <div class="bg-grid"></div>
    <div class="bg-particles">
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
    </div>
    <!-- Robot silhouette SVG -->
    <svg class="bg-robot" viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="60" y="10" width="80" height="60" rx="20" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.15)" stroke-width="1.5"/>
      <rect x="78" y="30" width="16" height="8" rx="4" fill="rgba(0,212,255,0.35)"/>
      <rect x="106" y="30" width="16" height="8" rx="4" fill="rgba(0,212,255,0.35)"/>
      <line x1="100" y1="10" x2="100" y2="0" stroke="rgba(0,212,255,0.2)" stroke-width="2"/>
      <circle cx="100" cy="0" r="3" fill="rgba(0,212,255,0.3)"/>
      <rect x="90" y="70" width="20" height="12" rx="4" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <rect x="50" y="82" width="100" height="80" rx="16" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.12)" stroke-width="1.5"/>
      <circle cx="100" cy="115" r="12" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>
      <circle cx="100" cy="115" r="5" fill="rgba(0,212,255,0.12)"/>
      <rect x="20" y="90" width="26" height="55" rx="13" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <rect x="154" y="90" width="26" height="55" rx="13" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <rect x="62" y="166" width="28" height="50" rx="12" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <rect x="110" y="166" width="28" height="50" rx="12" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <ellipse cx="76" cy="218" rx="18" ry="6" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <ellipse cx="124" cy="218" rx="18" ry="6" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <ellipse cx="100" cy="230" rx="70" ry="10" fill="rgba(0,212,255,0.05)"/>
      <ellipse cx="100" cy="230" rx="50" ry="6" fill="rgba(0,212,255,0.08)"/>
      <line class="scan-line" x1="45" y1="90" x2="155" y2="90" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    </svg>
  </div>

  <div class="stage-scroll">
    <div class="connect-header">
      <h1>Robot Controller</h1>
      <p id="connect-subtitle" class="text-secondary">Enter your display name to get started</p>
    </div>

    <div id="login-card" class="glass-card">
      <div class="config-grid">
        <input id="cfg-username" placeholder="Your display name" class="full-width">
        <button id="login-btn" class="btn-accent">Login</button>
        <button id="create-user-btn" class="btn-ghost">Create User</button>
      </div>
    </div>

    <div id="logged-in-card" class="glass-card hidden">
      <div class="logged-in-info">
        <p class="text-secondary">Logged in as</p>
        <p id="logged-in-username" class="logged-in-name">--</p>
      </div>
      <button id="logout-btn" class="btn-danger full-width">Logout</button>
    </div>

    <div id="connect-status" class="connect-status"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════
     STAGE 2 — Control
     ════════════════════════════════════════════════════════════ -->
<div id="stage-control" class="stage">
  <!-- Top bar -->
  <div class="top-bar">
    <div id="status" class="status-chip pending">Connecting...</div>
    <div id="robot-indicator" class="robot-chip hidden">
      <span class="dot"></span>
      <span id="info-robot">--</span>
    </div>
    <div id="live-badge" class="live-badge hidden">
      <span class="live-dot"></span> Live
    </div>
  </div>

  <!-- Session info -->
  <div id="session-info" class="session-bar hidden">
    <div class="info-item">
      <span class="info-label">User</span>
      <span id="info-user">--</span>
    </div>
    <div class="info-item">
      <span class="info-label">Session</span>
      <span id="info-session">--</span>
    </div>
  </div>

  <!-- Recording control -->
  <div class="record-area">
    <button id="btn-record" class="btn-record" disabled>
      <span class="record-dot"></span>
      <span id="record-label">Record</span>
    </button>
  </div>

  <!-- Video feed -->
  <div class="video-card">
    <img id="mjpeg-stream" alt="Live stream">
    <div id="video-placeholder" class="video-placeholder">
      <span class="video-placeholder__icon">&#9654;</span>
      <span>No video feed</span>
    </div>
  </div>

  <!-- D-Pad controls -->
  <div class="controls-area">
    <div class="side-controls">
      <button class="side-btn" data-action="rotate_ccw" title="Rotate CCW">&#8634;</button>
    </div>
    <div class="dpad-ring">
      <button class="dpad-btn dpad-up" data-action="forward">&#9650;</button>
      <button class="dpad-btn dpad-left" data-action="left">&#9664;</button>
      <button class="dpad-btn dpad-center" data-action="stop">STOP</button>
      <button class="dpad-btn dpad-right" data-action="right">&#9654;</button>
      <button class="dpad-btn dpad-down" data-action="backward">&#9660;</button>
    </div>
    <div class="side-controls">
      <button class="side-btn" data-action="rotate_cw" title="Rotate CW">&#8635;</button>
    </div>
  </div>

  <div id="last-cmd" class="last-cmd">Tap a button to send a command</div>
</div>

<!-- ════════════════════════════════════════════════════════════
     STAGE 3 — Sessions
     ════════════════════════════════════════════════════════════ -->
<div id="stage-sessions" class="stage">
  <div class="stage-scroll">
    <div class="sessions-header">
      <h2>Sessions</h2>
      <div class="session-actions">
        <button id="btn-refresh-sessions" class="btn-ghost">Refresh</button>
        <button id="btn-end-session" class="btn-danger btn-disabled">End Session</button>
      </div>
    </div>

    <div id="session-list" class="session-list">
      <p class="text-muted" style="padding:8px;">Tap Refresh to load sessions.</p>
    </div>
  </div>
</div>

<!-- ── Bottom Navigation ── -->
<nav id="bottom-nav" class="bottom-nav">
  <div class="nav-track">
    <div id="nav-slider" class="nav-slider" style="transform: translateX(200%)"></div>
    <button class="nav-btn nav-btn--locked" data-stage="stage-control" data-index="0">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="nav-label">Control</span>
    </button>
    <button class="nav-btn nav-btn--locked" data-stage="stage-sessions" data-index="1">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-label">Sessions</span>
    </button>
    <button class="nav-btn active" data-stage="stage-connect" data-index="2">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="nav-label">Settings</span>
    </button>
  </div>
</nav>

<!-- ── CDN Libraries (only MQTT.js needed in browser for WebSocket) ── -->
<script src="https://unpkg.com/mqtt@5.10.0/dist/mqtt.min.js"></script>

<!-- ── Shared State ── -->
<script>
  window.AppState = {
    mqttClient: null,
    SPEED: 100,
    ROTATE_SPEED: 50,
    currentRobotId: null,
    currentRobotStatus: 'unknown',
    lastRobotHeartbeat: null,
    currentSessionData: null,
    currentUsername: null,
    currentUserId: null,
    currentUserRole: null,
    isRecording: false,
    sessionCreating: false,
    sessionManuallyEnded: false,
    activeKeys: new Set(),
    sessionPollTimer: null,
    viewingSessionId: null,
  };
</script>

<!-- ── App Scripts ── -->
<script src="js/api.js"></script>
<script src="js/stream.js"></script>
<script src="js/mqtt.js"></script>
<script src="js/sessions.js"></script>
<script src="js/controls.js"></script>
<script src="js/app.js"></script>

</body>
</html>
